<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Golf Best Ball Tracker</title>
    
    <!-- Links your web app settings file -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Fixes the home screen icon specifically for iPhones -->
    <link rel="apple-touch-icon" href="SL Golf (1)">
    
    <!-- Theme color changes the top bar color on mobile devices -->
    <meta name="theme-color" content="#1e3a8a">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #1e3a8a;
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome to my PWA! ⛳</h1>
        <p>This app was built directly on GitHub and hosted on Vercel.</p>
        <p>The app icons are configured and ready to test on your phone's home screen.</p>
    </div>

    <!-- This script registers your app background worker so it acts like a real app -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered!', reg))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
