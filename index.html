<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF // Tournament Portal</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#050505">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --rhf-lime: #A6D608;
            --rhf-black: #050505;
            --rhf-charcoal: #141414;
            --rhf-card: #101010;
            --rhf-white: #EDEDED;
            --rhf-gray: #7A7A7A;
            --rhf-silver: #BFC0C2;
            --rhf-red: #E53935;
            --rhf-gold: #D4AF37;
            --primary: var(--rhf-lime);
            --text-main: var(--rhf-white);
            --text-sub: #9ca3af;
            --bg: var(--rhf-black);
            --card-bg: var(--rhf-card);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, rgba(166,214,8,0.06), transparent 40%), linear-gradient(to bottom, #0a0a0a, #050505);
            background-color: var(--bg); color: var(--text-main);
            min-height: 100vh; padding: 16px;
            display: flex; flex-direction: column; align-items: center;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 4px 4px; opacity: 0.25; pointer-events: none;
        }

        .container { width: 100%; max-width: 480px; position: relative; z-index: 2; }

        .hero-banner {
            margin-bottom: 18px; padding: 24px 20px; border-radius: 20px;
            background: linear-gradient(135deg, rgba(166,214,8,0.14), rgba(0,0,0,0.8)), #111;
            border: 1px solid rgba(166,214,8,0.15); box-shadow: 0 12px 30px rgba(0,0,0,0.7);
        }

        .hero-title { font-size: 38px; line-height: 0.95; color: var(--primary); font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; text-shadow: 0 0 20px rgba(166,214,8,0.35); }
        .hero-sub { margin-top: 8px; color: var(--rhf-white); font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }

        nav {
            display: flex; width: 100%; justify-content: space-around;
            background: rgba(20,20,20,0.92); border-radius: 18px; padding: 8px; margin-bottom: 22px;
            border: 1px solid rgba(166,214,8,0.12); box-shadow: 0 0 0 1px rgba(166,214,8,0.08), 0 10px 30px rgba(0,0,0,0.65);
        }

        .nav-btn {
            border: none; background: transparent; padding: 12px 8px; font-size: 14px; cursor: pointer; color: var(--text-sub);
            font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; transition: all 0.2s ease;
        }
        .nav-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); text-shadow: 0 0 12px rgba(166,214,8,0.4); }

        .view-title { font-size: 42px; color: var(--primary); margin: 6px 0 18px 0; text-align: center; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; text-shadow: 0 0 8px rgba(166,214,8,0.45), 0 0 30px rgba(166,214,8,0.15); }
        
        .card, .table-wrapper {
            background: linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(255,255,255,0.01)), var(--card-bg);
            border-radius: 18px; overflow: hidden; border: 1px solid rgba(166,214,8,0.12); box-shadow: 0 12px 30px rgba(0,0,0,0.7);
        }
        .card { padding: 22px; width: 100%; }
        .hidden { display: none !important; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(166,214,8,0.08); padding: 14px 12px; font-size: 13px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; color: var(--primary); text-transform: uppercase; }
        tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 16px 12px; font-size: 15px; color: var(--rhf-white); }
        .td-bold { font-weight: 800; color: var(--rhf-white); }

        .team-row { cursor: pointer; transition: all 0.2s ease; }
        .team-row:hover { background: rgba(166,214,8,0.08); }
        .player-sub-row { background: rgba(166,214,8,0.03); border-left: 4px solid rgba(166,214,8,0.2); }
        .player-sub-row td { color: #9ca3af; font-size: 13px; padding: 10px 12px; }
        .player-sub-row td:first-child { padding-left: 28px; color: #cbd5e1; }
        .chevron { display: inline-block; transition: transform 0.25s ease; color: var(--primary); font-size: 11px; margin-right: 6px; }
        .chevron.open { transform: rotate(90deg); }

        /* Scorecard specifics */
        .scorecard-table th, .scorecard-table td { text-align: center; padding: 12px 6px; }
        .scorecard-table th:first-child, .scorecard-table td:first-child { text-align: left; padding-left: 16px; font-weight: bold; width: 25%; }
        .score-circle { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 50%; color: var(--text-sub); border: 1px solid #333; }
        .score-used { font-weight: 700; border: 2px solid var(--primary); color: var(--primary); background-color: rgba(166,214,8,0.1); }

        label { display: block; font-size: 13px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; color: var(--primary); margin-bottom: 10px; }
        select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(166,214,8,0.15); font-size: 16px; background: #0c0c0c; color: white; }
        
        .hole-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; background: rgba(166,214,8,0.08); padding: 10px 14px; border-radius: 14px; border: 1px solid rgba(166,214,8,0.12); }
        .hole-nav-btn { background: var(--primary); color: black; border: none; width: 48px; height: 48px; font-size: 20px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        #current-hole-display { font-size: 24px; font-family: 'Bebas Neue', sans-serif; color: var(--primary); letter-spacing: 1px; }
        
        .player-score-block { margin-bottom: 18px; padding: 18px; background: rgba(255,255,255,0.02); border: 1px solid rgba(166,214,8,0.08); border-radius: 16px; }
        .player-name-label { font-size: 20px; font-family: 'Bebas Neue', sans-serif; color: var(--rhf-white); margin-bottom: 12px; letter-spacing: 1px; }
        .stepper { display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(166,214,8,0.15); border-radius: 14px; background: #0c0c0c; }
        .step-btn { width: 74px; height: 58px; font-size: 30px; border: none; background: rgba(166,214,8,0.1); color: var(--primary); cursor: pointer; font-weight: 800; }
        .step-val { font-size: 34px; font-weight: 800; color: var(--primary); font-family: 'Bebas Neue', sans-serif; }
        
        .submit-btn { width: 100%; padding: 18px; background: var(--primary); color: black; font-size: 22px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; border: none; border-radius: 14px; cursor: pointer; margin-top: 12px; box-shadow: 0 0 20px rgba(166,214,8,0.25); }
        .submit-btn.btn-warning { background: var(--rhf-gold); box-shadow: 0 0 20px rgba(212,175,55,0.25); }
        .submit-btn:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }
        
        .alert { padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 700; margin-bottom: 18px; text-align: center; }
        .change-team-lnk { text-align: center; margin-top: 18px; color: var(--text-sub); font-size: 14px; cursor: pointer; font-weight: 600; text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">

    <div class="hero-banner">
        <div class="hero-title">rHf x SL - 2026 Championship</div>
        <div class="hero-sub">Golf. Fish. Compete. Dominate.</div>
    </div>

    <nav>
        <button id="tab-leaderboard" class="nav-btn active" onclick="window.switchView('leaderboard')">LEADERBOARD</button>
        <button id="tab-scorecards" class="nav-btn" onclick="window.switchView('scorecards')">SCORECARDS</button>
        <button id="tab-entry" class="nav-btn" onclick="window.switchView('entry')">ENTER SCORES</button>
    </nav>

    <div id="view-leaderboard">
        <h2 class="view-title">LEADERBOARD</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>Team</th><th>Par</th><th>Thru</th><th>Used</th></tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="4" style="text-align:center; color:var(--text-sub); padding:30px;">INITIALIZING SYSTEM...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="view-scorecards" class="hidden">
        <h2 class="view-title">SCORECARDS</h2>
        <div class="card" style="margin-bottom:16px;">
            <label>Select Team</label>
            <select id="select-scorecard-team" onchange="window.renderScorecard()"></select>
        </div>
        <div id="scorecard-container" class="table-wrapper hidden"></div>
    </div>

    <div id="view-entry" class="hidden">
        <div class="card">
            <h2 class="view-title">ENTER SCORES</h2>
            <div id="form-alert" class="alert hidden"></div>

            <div id="team-selector-box">
                <label>Select Your Team</label>
                <select id="select-team" onchange="window.initTeamSession()"></select>
            </div>

            <div id="score-entry-box" class="hidden">
                <div class="hole-header">
                    <button type="button" id="btn-prev-hole" class="hole-nav-btn" onclick="window.changeHole(-1)" disabled>←</button>
                    <span id="current-hole-display">Hole 1</span>
                    <button type="button" id="btn-next-hole" class="hole-nav-btn" onclick="window.changeHole(1)">→</button>
                </div>
                
                <div id="player-inputs-container"></div>
                <button type="button" id="btn-submit" class="submit-btn" onclick="window.submitAllScores()">SAVE SCORES</button>
                <div class="change-team-lnk" onclick="window.resetTeam()">← SWITCH TEAM</div>
            </div>
        </div>
    </div>

</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const DB_URL = "https://gnsqewjsxveezexpitky.supabase.co";
    const DB_KEY = "sb_publishable_cVHE5Ju2PWvsvZmdW3lINQ_SjIgP2kD";
    const dbClient = createClient(DB_URL, DB_KEY);

    // App state
    let globalTeams       = [];
    let globalPlayers     = [];
    let currentTeamId     = null;
    let currentHole       = 1;
    let sessionPlayers    = [];
    let inputScoresState  = {};
    let expandedTeams     = new Set();
    let hasExistingScores = false;
    window.globalCalculatedTeams = {}; // Brain cache for scorecards

    // ─── NAV ───
    window.switchView = function(target) {
        ['leaderboard','scorecards','entry'].forEach(function(v) {
            document.getElementById('view-' + v).classList.add('hidden');
            document.getElementById('tab-' + v).classList.remove('active');
        });
        document.getElementById('view-' + target).classList.remove('hidden');
        document.getElementById('tab-' + target).classList.add('active');

        if (target === 'leaderboard') window.fetchAndCalculateLeaderboard();
        if (target === 'scorecards')  window.renderScorecard();
    };

    window.toggleTeamExpand = function(teamKey) {
        const rows    = document.querySelectorAll('.player-row-' + teamKey);
        const chevron = document.getElementById('chevron-' + teamKey);
        if (expandedTeams.has(teamKey)) {
            expandedTeams.delete(teamKey);
            rows.forEach(function(r) { r.classList.add('hidden'); });
            if (chevron) chevron.classList.remove('open');
        } else {
            expandedTeams.add(teamKey);
            rows.forEach(function(r) { r.classList.remove('hidden'); });
            if (chevron) chevron.classList.add('open');
        }
    };

    // ─── OPTIMIZATION ENGINE (The Brains) ───
    function runOptimizationEngine(holeScores) {
        holeScores.sort(function(a, b) { return a.hole_number - b.hole_number; });
        const activeHoles = holeScores.filter(function(h) { return h.player_a_strokes !== null || h.player_b_strokes !== null; }).length;
        let bestScore = Infinity; let optimalACount = 0; let optimalBCount = 0;
        let bestPath = []; 

        function exploreBranch(idx, accumulatingStrokes, countA, countB, currentPath) {
            if (accumulatingStrokes >= bestScore) return;
            if (idx === holeScores.length) {
                const holesLeft = 18 - activeHoles;
                if (activeHoles === 18 && (countA < 6 || countB < 6)) return;
                if ((countA + holesLeft) < 6 || (countB + holesLeft) < 6) return;
                
                if (accumulatingStrokes < bestScore) { 
                    bestScore = accumulatingStrokes; optimalACount = countA; optimalBCount = countB; bestPath = [...currentPath]; 
                }
                return;
            }
            
            const h = holeScores[idx];
            if (h.player_a_strokes === null && h.player_b_strokes === null) { currentPath.push(null); exploreBranch(idx + 1, accumulatingStrokes, countA, countB, currentPath); currentPath.pop(); return; }
            if (h.player_b_strokes === null) { currentPath.push('A'); exploreBranch(idx + 1, accumulatingStrokes + h.player_a_strokes, countA + 1, countB, currentPath); currentPath.pop(); return; }
            if (h.player_a_strokes === null) { currentPath.push('B'); exploreBranch(idx + 1, accumulatingStrokes + h.player_b_strokes, countA, countB + 1, currentPath); currentPath.pop(); return; }

            const tryA = function() { currentPath.push('A'); exploreBranch(idx + 1, accumulatingStrokes + h.player_a_strokes, countA + 1, countB, currentPath); currentPath.pop(); };
            const tryB = function() { currentPath.push('B'); exploreBranch(idx + 1, accumulatingStrokes + h.player_b_strokes, countA, countB + 1, currentPath); currentPath.pop(); };

            if (h.player_a_strokes < h.player_b_strokes) { tryA(); tryB(); }
            else if (h.player_b_strokes < h.player_a_strokes) { tryB(); tryA(); }
            else { if (countA <= countB) { tryA(); tryB(); } else { tryB(); tryA(); } }
        }

        exploreBranch(0, 0, 0, 0, []);

        if (bestScore === Infinity) {
            let greedyScore = 0; let gA = 0; let gB = 0; bestPath = [];
            holeScores.forEach(function(h) {
                if (h.player_a_strokes === null && h.player_b_strokes === null) { bestPath.push(null); } 
                else if (h.player_a_strokes !== null && h.player_b_strokes === null) { bestPath.push('A'); gA++; greedyScore += h.player_a_strokes; } 
                else if (h.player_b_strokes !== null && h.player_a_strokes === null) { bestPath.push('B'); gB++; greedyScore += h.player_b_strokes; } 
                else {
                    if (h.player_a_strokes < h.player_b_strokes) { bestPath.push('A'); gA++; greedyScore += h.player_a_strokes; } 
                    else if (h.player_b_strokes < h.player_a_strokes) { bestPath.push('B'); gB++; greedyScore += h.player_b_strokes; } 
                    else { if (gA <= gB) { bestPath.push('A'); gA++; greedyScore += h.player_a_strokes; } else { bestPath.push('B'); gB++; greedyScore += h.player_b_strokes; } }
                }
            });
            bestScore = greedyScore; optimalACount = gA; optimalBCount = gB;
        }

        let holePathMap = {};
        holeScores.forEach(function(h, index) { holePathMap[h.hole_number] = bestPath[index]; });

        const totalParAccumulated = holeScores.reduce(function(sum, h) { return sum + (holePathMap[h.hole_number] ? h.par : 0); }, 0);

        return {
            totalStrokes: bestScore, relativeToPar: bestScore - totalParAccumulated, 
            thru: activeHoles, usedA: optimalACount, usedB: optimalBCount, pathMap: holePathMap, scores: holeScores
        };
    }

    // ─── LEADERBOARD DATA ───
    window.fetchAndCalculateLeaderboard = async function() {
        const tbody = document.getElementById('leaderboard-body');
        try {
            const { data: matrix, error } = await dbClient.from('team_hole_scores_matrix').select('*');
            if (error) throw error;

            if (!matrix || matrix.length === 0) {
                tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:20px; color:var(--text-sub);'>Waiting for savages to post scores.</td></tr>";
                return;
            }

            const groupedData = matrix.reduce(function(acc, row) {
                if (!acc[row.team_id]) acc[row.team_id] = { name: row.team_name, scores: [] };
                acc[row.team_id].scores.push(row); return acc;
            }, {});

            window.globalCalculatedTeams = {}; 

            const calculatedTeams = Object.keys(groupedData).map(function(tId) {
                const teamData = groupedData[tId];
                const engineData = runOptimizationEngine(teamData.scores);
                const fullTeamData = Object.assign({}, { id: tId, name: teamData.name }, engineData);
                window.globalCalculatedTeams[tId] = fullTeamData; 
                return fullTeamData;
            }).sort(function(x, y) { return x.relativeToPar - y.relativeToPar; });

            tbody.innerHTML = '';
            
            calculatedTeams.forEach(function(t) {
                const teamMembers = globalPlayers.filter(function(p) { return p.team_id === t.id; });
                const playerA = (teamMembers[0] && teamMembers[0].player_name) ? teamMembers[0].player_name : 'Player A';
                const playerB = (teamMembers[1] && teamMembers[1].player_name) ? teamMembers[1].player_name : 'Player B';

                let aStrokes = 0, aParTotal = 0, aThru = 0; let bStrokes = 0, bParTotal = 0, bThru = 0;
                t.scores.forEach(function(h) {
                    if (h.player_a_strokes !== null) { aStrokes += h.player_a_strokes; aParTotal += h.par; aThru++; }
                    if (h.player_b_strokes !== null) { bStrokes += h.player_b_strokes; bParTotal += h.par; bThru++; }
                });

                let aRel = aStrokes - aParTotal; let bRel = bStrokes - bParTotal;
                let formatRel = function(rel) { return rel === 0 ? 'E' : (rel > 0 ? '+' + rel : rel); };
                let colorRel = function(rel) { return rel < 0 ? '#E53935' : (rel > 0 ? '#9ca3af' : '#A6D608'); };

                let displayPar = t.relativeToPar === 0 ? 'E' : (t.relativeToPar > 0 ? '+' + t.relativeToPar : t.relativeToPar);
                let strokeColor = t.relativeToPar < 0 ? '#E53935' : (t.relativeToPar > 0 ? '#9ca3af' : '#A6D608');
                
                const teamKey = t.id.replace(/\W+/g, '_');
                let tr = document.createElement('tr');
                tr.className = 'team-row';
                tr.onclick = function() { window.toggleTeamExpand(teamKey); };
                tr.innerHTML = `
                    <td class='td-bold'><span id="chevron-${teamKey}" class="chevron">▶</span> ${t.name}</td>
                    <td class='td-bold' style='color: ${strokeColor}'>${displayPar}</td>
                    <td>${t.thru}</td>
                    <td style='font-size: 13px; color: var(--text-sub);'>${t.usedA}/${t.usedB}</td>
                `;
                tbody.appendChild(tr);

                let trA = document.createElement('tr');
                trA.className = 'player-sub-row player-row-' + teamKey + ' hidden';
                trA.innerHTML = `<td>↳ ${playerA}</td><td style='color: ${colorRel(aRel)}; font-weight:bold;'>${formatRel(aRel)}</td><td>${aThru}</td><td>${t.usedA}</td>`;
                tbody.appendChild(trA);

                let trB = document.createElement('tr');
                trB.className = 'player-sub-row player-row-' + teamKey + ' hidden';
                trB.innerHTML = `<td>↳ ${playerB}</td><td style='color: ${colorRel(bRel)}; font-weight:bold;'>${formatRel(bRel)}</td><td>${bThru}</td><td>${t.usedB}</td>`;
                tbody.appendChild(trB);
            });
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan='4' style='text-align:center; color:var(--rhf-red); padding:20px;'>CRASH: ${err.message}</td></tr>`;
        }
    };

    // ─── SCORECARDS ───
    window.renderScorecard = function() {
        const teamId = document.getElementById('select-scorecard-team').value;
        const container = document.getElementById('scorecard-container');

        if (!teamId) { container.classList.add('hidden'); return; }

        const teamObj = window.globalCalculatedTeams[teamId];
        if (!teamObj) {
            container.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text-sub);">Loading scorecard logic...</div>';
            container.classList.remove('hidden');
            return;
        }

        container.classList.remove('hidden');
        const teamMembers = globalPlayers.filter(function(p) { return p.team_id === teamId; });
        const pA = teamMembers[0] ? teamMembers[0].player_name.split(' ')[0] : 'P1';
        const pB = teamMembers[1] ? teamMembers[1].player_name.split(' ')[0] : 'P2';

        let html = '<table class="scorecard-table"><thead><tr><th>Hole</th><th>Par</th><th>' + pA + '</th><th>' + pB + '</th></tr></thead><tbody>';

        for (let i = 1; i <= 18; i++) {
            const holeData = teamObj.scores.find(function(h) { return h.hole_number === i; }) || { par: 4, player_a_strokes: null, player_b_strokes: null };
            const pathChoice = teamObj.pathMap[i]; 

            let scoreA = holeData.player_a_strokes; let scoreB = holeData.player_b_strokes;
            let classA = 'score-circle'; let classB = 'score-circle';

            if (pathChoice === 'A') classA += ' score-used';
            if (pathChoice === 'B') classB += ' score-used';

            let displayA = scoreA !== null ? '<span class="' + classA + '">' + scoreA + '</span>' : '-';
            let displayB = scoreB !== null ? '<span class="' + classB + '">' + scoreB + '</span>' : '-';

            html += '<tr><td>' + i + '</td><td style="color:#7A7A7A;">' + (holeData.par || 4) + '</td><td>' + displayA + '</td><td>' + displayB + '</td></tr>';
        }

        html += '</tbody></table>';
        container.innerHTML = html;
    };

    // ─── OVERRIDE & SCORE ENTRY LOGIC ───
    window.checkExistingScores = async function() {
        if (!currentTeamId || sessionPlayers.length === 0) return;
        
        const playerIds = sessionPlayers.map(p => p.id);
        const { data, error } = await dbClient.from('scores')
            .select('*')
            .in('player_id', playerIds)
            .eq('hole_number', currentHole);
            
        const submitBtn = document.getElementById('btn-submit');

        if (data && data.length > 0) {
            hasExistingScores = true;
            data.forEach(score => { inputScoresState[score.player_id] = score.strokes; });
            submitBtn.textContent = "OVERWRITE SCORES";
            submitBtn.classList.add('btn-warning');
        } else {
            hasExistingScores = false;
            sessionPlayers.forEach(function(p) { inputScoresState[p.id] = 4; });
            submitBtn.textContent = "SAVE SCORES";
            submitBtn.classList.remove('btn-warning');
        }
        renderDualPlayerInputs();
    };

    window.initTeamSession = async function() {
        currentTeamId = document.getElementById('select-team').value;
        if (!currentTeamId) return;
        sessionPlayers = globalPlayers.filter(function(p) { return p.team_id === currentTeamId; });
        document.getElementById('team-selector-box').classList.add('hidden');
        document.getElementById('score-entry-box').classList.remove('hidden');
        await window.checkExistingScores();
    };

    window.resetTeam = function() {
        currentTeamId = null; hasExistingScores = false;
        document.getElementById('select-team').value = "";
        document.getElementById('team-selector-box').classList.remove('hidden');
        document.getElementById('score-entry-box').classList.add('hidden');
        document.getElementById('form-alert').className = "alert hidden";
    };

    window.changeHole = async function(direction) {
        currentHole = Math.max(1, Math.min(18, currentHole + direction));
        document.getElementById('current-hole-display').textContent = 'Hole ' + currentHole;
        document.getElementById('btn-prev-hole').disabled = (currentHole === 1);
        document.getElementById('btn-next-hole').disabled = (currentHole === 18);
        await window.checkExistingScores();
    };

    window.adjustPlayerStrokes = function(playerId, amount) {
        inputScoresState[playerId] = Math.max(1, (inputScoresState[playerId] || 4) + amount);
        document.getElementById('display-' + playerId).textContent = inputScoresState[playerId];
    };

    function renderDualPlayerInputs() {
        const container = document.getElementById('player-inputs-container');
        container.innerHTML = '';
        sessionPlayers.forEach(function(p) {
            const block = document.createElement('div');
            block.className = 'player-score-block';
            block.innerHTML = `
                <div class="player-name-label">${p.player_name}</div>
                <div class="stepper">
                    <button type="button" class="step-btn" onclick="window.adjustPlayerStrokes('${p.id}', -1)">-</button>
                    <span id="display-${p.id}" class="step-val">${inputScoresState[p.id]}</span>
                    <button type="button" class="step-btn" onclick="window.adjustPlayerStrokes('${p.id}', 1)">+</button>
                </div>
            `;
            container.appendChild(block);
        });
    }

    window.submitAllScores = async function() {
        if (hasExistingScores) {
            const confirmed = confirm(`Scores already exist for Hole ${currentHole}. Are you sure you want to overwrite them?`);
            if (!confirmed) return;
        }

        const submitBtn = document.getElementById('btn-submit');
        const alertBox = document.getElementById('form-alert');
        submitBtn.disabled = true; alertBox.className = "alert hidden";

        const batchPayload = sessionPlayers.map(function(p) {
            return { player_id: p.id, hole_number: parseInt(currentHole), strokes: parseInt(inputScoresState[p.id]) };
        });

        try {
            const { error } = await dbClient.from('scores').upsert(batchPayload, { onConflict: 'player_id,hole_number' });
            if (error) throw error;

            alertBox.textContent = 'HOLE ' + currentHole + ' LOCKED IN 🔥';
            alertBox.style.backgroundColor = "rgba(166,214,8,0.15)"; alertBox.style.color = "#A6D608";
            
            if (currentHole < 18) {
                setTimeout(function() { window.changeHole(1); alertBox.className = "alert hidden"; }, 800);
            } else {
                hasExistingScores = true; // They just saved it, so it exists now
                submitBtn.textContent = "OVERWRITE SCORES";
                submitBtn.classList.add('btn-warning');
            }
        } catch (err) {
            alertBox.textContent = "CRASH: " + err.message;
            alertBox.style.backgroundColor = "rgba(229,57,53,0.15)"; alertBox.style.color = "#E53935";
        } finally {
            setTimeout(function() { submitBtn.disabled = false; }, 400);
            alertBox.classList.remove('hidden');
        }
    };
