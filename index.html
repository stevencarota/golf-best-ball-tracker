<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Golf Best Ball Tracker</title>
    
    <style>
        :root { --primary: #1e3a8a; --primary-light: #eff6ff; --text-main: #1e293b; --bg: #f8fafc; --card-bg: #ffffff; --border: #cbd5e1; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); padding: 12px; }
        .container { max-width: 450px; margin: 0 auto; }
        .nav { display: flex; justify-content: space-around; background: var(--card-bg); border-radius: 12px; padding: 6px; margin-bottom: 16px; }
        .nav-btn { border: none; background: none; padding: 12px; cursor: pointer; color: #64748b; font-weight: 500; }
        .nav-btn.active { color: var(--primary); font-weight: 700; border-bottom: 2px solid var(--primary); }
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        
        .hole-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .hole-nav-btn { background: var(--primary-light); border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        
        .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 10px; background: #f1f5f9; border-radius: 8px; }
        .submit-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <button id="tab-leaderboard" class="nav-btn active" onclick="window.switchView('leaderboard')">📊 Leaderboard</button>
        <button id="tab-entry" class="nav-btn" onclick="window.switchView('entry')">✏️ Enter Scores</button>
    </div>

    <div id="view-leaderboard"><div class="card" id="leaderboard-body">Loading...</div></div>

    <div id="view-entry" class="hidden">
        <div class="card">
            <div id="team-selector-box">
                <label>Select Your Team</label>
                <select id="select-team" onchange="window.initTeamSession()" style="width:100%; padding:10px; margin-bottom:20px;"></select>
            </div>

            <div id="score-entry-box" class="hidden">
                <div class="hole-header">
                    <button class="hole-nav-btn" onclick="window.changeHole(-1)">←</button>
                    <h2 id="current-hole-display">Hole 1 (Par 4)</h2>
                    <button class="hole-nav-btn" onclick="window.changeHole(1)">→</button>
                </div>
                
                <div id="player-inputs"></div>
                <button class="submit-btn" onclick="window.submitAllScores()">Save Hole Scores</button>
                <p style="text-align:center; margin-top:10px; cursor:pointer; color:var(--text-sub);" onclick="window.resetTeam()">Change Team</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const dbClient = createClient("https://gnsqewjsxveezexpitky.supabase.co", "sb_publishable_cVHE5Ju2PWvsvZmdW3lINQ_SjIgP2kD");

    let currentTeamId = null;
    let currentHole = 1;
    let teamPlayers = [];

    window.switchView = (v) => {
        document.getElementById('view-leaderboard').classList.toggle('hidden', v !== 'leaderboard');
        document.getElementById('view-entry').classList.toggle('hidden', v !== 'entry');
    };

    window.initTeamSession = async () => {
        currentTeamId = document.getElementById('select-team').value;
        if(!currentTeamId) return;
        
        const { data } = await dbClient.from('players').select('*').eq('team_id', currentTeamId);
        teamPlayers = data;
        
        document.getElementById('team-selector-box').classList.add('hidden');
        document.getElementById('score-entry-box').classList.remove('hidden');
        renderInputs();
    };

    window.resetTeam = () => {
        currentTeamId = null;
        document.getElementById('team-selector-box').classList.remove('hidden');
        document.getElementById('score-entry-box').classList.add('hidden');
    };

    window.changeHole = (dir) => {
        currentHole = Math.max(1, Math.min(18, currentHole + dir));
        document.getElementById('current-hole-display').textContent = `Hole ${currentHole} (Par 4)`;
        renderInputs();
    };

    function renderInputs() {
        const container = document.getElementById('player-inputs');
        container.innerHTML = teamPlayers.map(p => `
            <div class="score-row">
                <span>${p.player_name}</span>
                <input type="number" id="score-${p.id}" value="4" style="width:50px; padding:8px;">
            </div>
        `).join('');
    }

    window.submitAllScores = async () => {
        const updates = teamPlayers.map(p => ({
            player_id: p.id,
            hole_number: currentHole,
            strokes: parseInt(document.getElementById(`score-${p.id}`).value)
        }));
        
        await dbClient.from('scores').upsert(updates, { onConflict: 'player_id,hole_number' });
        alert("Scores Saved!");
        if(currentHole < 18) window.changeHole(1);
    };

    // Load initial team list
    const { data: teams } = await dbClient.from('teams').select('*');
    document.getElementById('select-team').innerHTML = '<option value="">-- Choose Team --</option>' + 
        teams.map(t => `<option value="${t.id}">${t.team_name}</option>`).join('');
</script>
</body>
</html>
