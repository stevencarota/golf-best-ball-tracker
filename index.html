<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF // Tournament Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rhf-lime: #A6D608;
            --rhf-black: #050505;
            --rhf-charcoal: #141414;
            --rhf-white: #EDEDED;
            --rhf-gray: #7A7A7A;
            --rhf-silver: #BFC0C2;
            --rhf-red: #E53935;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--rhf-black); 
            color: var(--rhf-white); 
            background-image: radial-gradient(circle at top right, #1a1a1a, #050505);
            padding: 16px;
        }

        h1, h2, .nav-btn, .view-title { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; text-transform: uppercase; }

        .container { max-width: 500px; margin: 0 auto; }

        /* Navigation */
        nav { 
            display: flex; justify-content: space-around; 
            background: var(--rhf-charcoal); 
            border: 1px solid #333; 
            border-radius: 4px; padding: 12px; margin-bottom: 24px;
        }
        .nav-btn { background: none; border: none; color: var(--rhf-gray); font-size: 1.1rem; cursor: pointer; }
        .nav-btn.active { color: var(--rhf-lime); border-bottom: 2px solid var(--rhf-lime); }

        /* Cards */
        .card { 
            background: var(--rhf-charcoal); 
            border: 1px solid rgba(166, 214, 8, 0.2); 
            border-radius: 14px; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            margin-bottom: 20px;
        }

        .view-title { color: var(--rhf-lime); font-size: 2.5rem; text-align: center; margin-bottom: 20px; }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { color: var(--rhf-silver); font-size: 0.7rem; padding: 10px; border-bottom: 1px solid #333; text-align: left; }
        td { padding: 15px 10px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .hidden { display: none !important; }

        /* Scorecard Circles */
        .score-circle { border: 2px solid var(--rhf-gray); padding: 4px 8px; border-radius: 50%; color: var(--rhf-white); }
        .score-used { border-color: var(--rhf-lime); color: var(--rhf-lime); background: rgba(166,214,8,0.1); font-weight: bold; }

        /* Form Elements */
        select { width: 100%; padding: 12px; background: var(--rhf-black); color: var(--rhf-white); border: 1px solid var(--rhf-lime); border-radius: 4px; font-family: 'Bebas Neue'; font-size: 1.1rem; }
        .btn-primary { 
            background: var(--rhf-lime); color: var(--rhf-black); 
            border: none; padding: 16px; font-family: 'Bebas Neue'; 
            font-size: 1.2rem; width: 100%; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <button id="tab-leaderboard" class="nav-btn active" onclick="window.switchView('leaderboard')">Leaderboard</button>
            <button id="tab-scorecards" class="nav-btn" onclick="window.switchView('scorecards')">Cards</button>
            <button id="tab-entry" class="nav-btn" onclick="window.switchView('entry')">Enter</button>
        </nav>

        <div id="view-leaderboard">
            <h1 class="view-title">Leaderboard</h1>
            <div class="card"><table id="leaderboard-body"></table></div>
        </div>

        <div id="view-scorecards" class="hidden">
            <h1 class="view-title">Scorecards</h1>
            <div class="card">
                <select id="select-scorecard-team" onchange="window.renderScorecard()"></select>
                <div id="scorecard-container" style="margin-top:20px;"></div>
            </div>
        </div>

        <div id="view-entry" class="hidden">
            <h1 class="view-title">Enter Score</h1>
            <div class="card" id="entry-card">
                <select id="select-team" onchange="window.initTeamSession()"></select>
                <div id="score-entry-controls" class="hidden"></div>
            </div>
        </div>
    </div>

    <script type="module">
        // --- CORE UI SWITCHER ---
        window.switchView = function(target) {
            document.querySelectorAll('[id^="view-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('view-' + target).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + target).classList.add('active');
        };

        // --- DATABASE & ENGINE (Supabase Setup) ---
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        const dbClient = createClient("https://gnsqewjsxveezexpitky.supabase.co", "sb_publishable_cVHE5Ju2PWvsvZmdW3lINQ_SjIgP2kD");

        // Your previous logic (runOptimizationEngine, fetchAndCalculateLeaderboard, renderScorecard, etc.) 
        // goes exactly here. Because the CSS is now encapsulated in the <style> tag above, 
        // the HTML/JS remains fully functional and ready for your next custom feature.
    </script>
</body>
</html>
